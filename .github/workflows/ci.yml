name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Start vcsim
        run: docker compose -f docker-compose.vcsim.yml up -d --wait

      - name: Run unit tests
        run: pytest -m unit -v

      - name: Run integration tests
        env:
          VSPHERE_PASSWORD: ${{ secrets.VSPHERE_PASSWORD }}
          VCSIM_HOST: 127.0.0.1
          VCSIM_PORT: "8989"
        run: pytest -m integration -v

      - name: Stop vcsim
        if: always()
        run: docker compose -f docker-compose.vcsim.yml down
