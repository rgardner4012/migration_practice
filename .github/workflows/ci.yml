name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Start vcsim
        run: docker compose -f docker-compose.vcsim.yml up -d

      - name: Wait for vcsim to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sk https://127.0.0.1:8989/sdk > /dev/null 2>&1; then
              echo "vcsim is ready"
              exit 0
            fi
            echo "Waiting for vcsim... ($i/15)"
            sleep 2
          done
          echo "vcsim failed to become ready after 30s"
          docker compose -f docker-compose.vcsim.yml logs
          exit 1

      - name: Run unit tests
        run: pytest -m unit -v

      - name: Run integration tests
        env:
          VSPHERE_PASSWORD: ${{ secrets.VSPHERE_PASSWORD }}
          VCSIM_HOST: 127.0.0.1
          VCSIM_PORT: "8989"
        run: pytest -m integration -v

      - name: Stop vcsim
        if: always()
        run: docker compose -f docker-compose.vcsim.yml down
